---
- name: Create paas_ap group
  group:
    name: "{{ paas_ap_username }}"
    state: present

- name: Create paas_ap user
  user:
    name: "{{ paas_ap_username }}"
    uid: "{{ paas_ap_uid }}"
    group: "{{ paas_ap_username }}"
    groups: "{{ _paas_ap_groups }}"
    append: true
    password: "{{ paas_ap_password | password_hash('sha512') }}"
    shell: "{{ paas_ap_shell }}"
    home: "{{ paas_ap_home }}"
    create_home: true
    state: present
    update_password: on_create

- name: Ensure paas_ap home directory permissions
  file:
    path: "{{ paas_ap_home }}"
    owner: "{{ paas_ap_username }}"
    group: "{{ paas_ap_username }}"
    mode: "0700"
    state: directory
