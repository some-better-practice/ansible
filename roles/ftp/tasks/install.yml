---
- name: Install FTP packages
  dnf:
    name: "{{ _ftp_packages }}"
    state: present

- name: Create FTP root directory
  file:
    path: "{{ ftp_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create per-user FTP directories
  file:
    path: "{{ ftp_root }}/{{ item.name }}"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0755"
  loop: "{{ ftp_users }}"
